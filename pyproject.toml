[project]
name = "apoch-ai"
version = "0.1.0"
description = "Agent-agnostic Python framework for AI-assisted development workflows"
requires-python = ">=3.13"
dependencies = ["pyyaml>=6.0", "typer>=0.15"]

[project.scripts]
apoch = "apoch.cli.app:app"

[project.entry-points."apoch.modules"]
# First-party modules register here, e.g.:
# chronicle = "apoch.modules.chronicle.module:ChronicleModule"

[project.entry-points."apoch.plugins"]
# Third-party plugins register here

[build-system]
requires = ["setuptools"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
include = ["apoch*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[tool.ruff]
target-version = "py313"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
